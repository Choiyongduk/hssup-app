<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    
    <!-- 기본 정보 -->
    <title>HSSUP Beauty Academy</title>
    <meta name="description" content="반영구 시술 전문 학원 — 눈썹, 입술, 아이라인, 속눈썹" />
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- 파비콘 -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    
    <!-- iOS (애플 홈 화면 추가용) -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="HSSUP" />
    
    <!-- 안드로이드 (테마 색상) -->
    <meta name="theme-color" content="#FF5C1F" />
    <meta name="mobile-web-app-capable" content="yes" />
    
    <!-- 소셜 공유 (카톡, 페이스북 등) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="HSSUP Beauty Academy" />
    <meta property="og:description" content="반영구 시술 전문 학원" />
    <meta property="og:image" content="/android-chrome-512x512.png" />
    <meta property="og:locale" content="ko_KR" />
    
    <!-- 다크 배경 강제 (흰 화면 깜빡임 방지) -->
    <style>
      html, body {
        background: #0A0A0A !important;
        margin: 0;
        padding: 0;
        overscroll-behavior: none;
        color-scheme: dark;
        -webkit-tap-highlight-color: transparent;
      }
      #root {
        background: #0A0A0A;
        min-height: 100dvh;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
